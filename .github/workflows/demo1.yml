name: post api collection

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test_run:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v6.0.2
      - name: Install nodejs and npm
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
 
      - name: Install newmam
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: run the collection
        run: 
          newman run Practice.postman_collection.json -e QA.postman_environment.json -d testdata.csv -r cli,htmlextra






        
      

      
