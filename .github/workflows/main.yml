name: postman collection workflow

on: 
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 14 * * *
    - cron: 30 1 * * *

jobs:
  test-postman-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v6.0.2
      - name: intstall nodejs
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
      - name: install newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
      - name: run the collection
        run: |
          newman run Practice.postman_collection.json \
          -e QA.postman_environment.json \
          -d testdata.csv \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./newman/index.html
      - name: artifact the report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Postman html report
          path: newman/*.html
      - name: create a github pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/
      - name: sending email notification
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Phoenix collection report
          to: jeeva4699@gamil.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Hello Everyone,
               Please find the collection report.
               URL: https://jeeva46.github.io/Phoenix-practice/

          attachments: newman/index.html

        
          
      

          
      
      
          
      
