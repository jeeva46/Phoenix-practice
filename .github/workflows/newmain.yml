name: new postman collection workflow

on:
  push:
    branches: 
      - main
  workflow_dispatch:
  schedule:
    - cron: 30 14 * * *


jobs:
  new_test_runner:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v6.0.2

      - name: install nodejs
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - name: install newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-html

      - name: run the collection
        run: |
          newman run Practice.postman_collection.json -e QA.postman_environment.json -d testdata.csv -r cli,html

      - name: save the html report
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: HTML REPORT
          path: newman/*html
        



















    
